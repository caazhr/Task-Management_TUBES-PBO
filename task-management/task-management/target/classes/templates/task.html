<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Semua Tugas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">

    <form action="/tasks"
      method="get"
      class="row g-2 mb-4">

    <div class="col-md-4">

        <select name="categoryId"
                class="form-select">

            <option value="">
                Semua Kategori
            </option>

            <option
                    th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}">
            </option>

        </select>

    </div>

    <div class="col-md-4">

        <select name="priority"
                class="form-select">

            <option value="">
                Semua Prioritas
            </option>

            <option value="LOW">
                LOW
            </option>

            <option value="MEDIUM">
                MEDIUM
            </option>

            <option value="HIGH">
                HIGH
            </option>

        </select>

    </div>

    <div class="col-md-2">

        <button type="submit"
                class="btn btn-primary">

            Filter

        </button>

    </div>

    <div class="col-md-2">

        <a href="/tasks"
           class="btn btn-secondary">

            Reset

        </a>

    </div>

</form>

    <h1 class="text-primary">
        📋 Semua Tugas
    </h1>

    <a href="/tasks/add"
       class="btn btn-success">
        ➕ Tambah Tugas
    </a>

</div>

<div class="card shadow-sm">

    <div class="card-body">

        <div th:if="${error == 'deadline'}"
     class="alert alert-danger">

    Deadline tidak boleh sebelum hari ini!

</div>

        <table class="table table-striped table-hover">

            <thead>

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Deadline</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="task : ${tasks}">

                <td th:text="${task.id}"></td>

                <td th:text="${task.title}"></td>

                <td th:text="${task.priority}"></td>

                <td th:text="${task.status}"></td>

                <td th:text="${task.deadline}"></td>

               <td>

<a
        th:href="@{/tasks/edit/{id}(id=${task.id})}"
        class="btn btn-warning btn-sm">

    Edit

</a>


<a
        th:href="@{/tasks/delete/{id}(id=${task.id})}"
        class="btn btn-danger btn-sm">

    Delete

</a>

</td>


            </tr>

            </tbody>

        </table>

    </div>

</div>

<br>

<a href="/dashboard"
   class="btn btn-primary">
    Back to Dashboard
</a>

</div>

</body>
</html>
