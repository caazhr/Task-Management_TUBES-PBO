<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Tambah Tugas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-primary mb-4">
    ➕ Tambah Tugas
</h1>

<div class="card shadow-sm">

    <div class="card-body">

        <div th:if="${error == 'deadline'}"
     class="alert alert-danger">

    Deadline tidak boleh sebelum hari ini!

    </div>

        <form th:action="@{/tasks}" method="post">

            <div class="mb-3">
                <label class="form-label">Task Type</label>

                <select name="taskType" class="form-select">
                    <option value="ACADEMIC">Academic Task</option>
                    <option value="PERSONAL">Personal Task</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Course Name</label>

                <input type="text"
                       name="courseName"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Title</label>

                <input type="text"
                       name="title"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>

                <textarea name="description"
                          class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Deadline</label>

                <input type="date"
                       name="deadline"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Priority</label>

                <select name="priority" class="form-select">
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="HIGH">HIGH</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>

                <select name="status" class="form-select">
                    <option value="BELUM_SELESAI">BELUM_SELESAI</option>
                    <option value="PROGRESS">PROGRESS</option>
                    <option value="SELESAI">SELESAI</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>

                <select name="categoryId" class="form-select">

                    <option
                            th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                    </option>

                </select>

            </div>

            <button type="submit"
                    class="btn btn-success">
                Save Task
            </button>

            <a href="/tasks"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

</div>

</body>
</html>
