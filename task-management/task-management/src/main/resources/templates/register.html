<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row vh-100 align-items-center">

    <div class="col-md-5 mx-auto">

        <div class="card shadow-lg border-0">

            <div class="card-header text-center text-white"
                 style="background-color:#151C34;">

                <h2 class="mt-2">
                    Create Account
                </h2>

            </div>

            <div class="card-body p-4">

                <form th:action="@{/register}"
                      th:object="${user}"
                      method="post">

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input type="text"
                               th:field="*{username}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               th:field="*{password}"
                               class="form-control"
                               required>

                    </div>

                    <div class="d-grid">

                        <button type="submit"
                                class="btn text-white"
                                style="background-color:#151C34;">

                            Register

                        </button>

                    </div>

                </form>

                <hr>

                <p class="text-center">

                    Sudah punya akun?

                    <a href="/login">
                        Login
                    </a>

                </p>

                <p class="text-center">

                    <a href="/">
                        ← Kembali ke Home
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
